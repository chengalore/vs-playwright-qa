name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Direct PDP URL (optional)"
        required: false
        default: ""
        type: string
      store_id:
        description: "Store ID"
        required: false
        default: ""
        type: string
      product_type_id:
        description: "Product type ID"
        required: false
        default: ""
        type: string
      gender:
        description: "Gender filter"
        required: false
        default: ""
        type: string
      exclude_kids:
        description: "Exclude kids products"
        required: false
        default: ""
        type: string
      phase:
        description: "Test phase (widget/events/api/onboarding/full)"
        required: false
        default: "full"
        type: string
      store_alias:
        description: "Store alias (for fallback tracking)"
        required: false
        default: ""
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Restore fallback products cache
        uses: actions/cache@v4
        with:
          path: data/fallbackProducts.json
          key: fallback-products-v1
          restore-keys: fallback-products-v1

      - name: Set TEST_URL from direct input
        if: ${{ github.event.inputs.url != '' }}
        run: echo "TEST_URL=${{ github.event.inputs.url }}" >> $GITHUB_ENV

      - name: Resolve URL from store filters
        if: ${{ github.event.inputs.url == '' }}
        run: |
          node --input-type=module <<'SCRIPT'
          import { resolveTestUrl } from './utils/fetchRandomProduct.js';
          import { appendFileSync } from 'fs';

          const url = await resolveTestUrl(null);
          if (!url) {
            console.error('Could not find a valid product URL');
            process.exit(1);
          }
          appendFileSync(process.env.GITHUB_ENV, `TEST_URL=${url}\n`);
          console.log(`Resolved TEST_URL: ${url}`);
          SCRIPT
        env:
          STORE_ID: ${{ github.event.inputs.store_id }}
          PRODUCT_TYPE_ID: ${{ github.event.inputs.product_type_id }}
          GENDER: ${{ github.event.inputs.gender }}
          EXCLUDE_KIDS: ${{ github.event.inputs.exclude_kids }}

      - name: Notify Slack - test starting
        run: |
          curl -s -X POST \
            -H "Content-type: application/json" \
            --data "{\"text\":\"🔍 Testing: ${TEST_URL}\"}" \
            "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ env.TEST_URL }}
          TEST_PHASE: ${{ github.event.inputs.phase }}

      - name: Save successful URL as fallback
        if: success()
        run: |
          node --input-type=module <<'SCRIPT'
          import { saveFallback } from './utils/fallbackStore.js';
          const alias = process.env.STORE_ALIAS;
          const url = process.env.TEST_URL;
          if (alias && url) {
            saveFallback(alias, url);
            console.log(`Saved fallback: ${alias} → ${url}`);
          }
          SCRIPT
        env:
          STORE_ALIAS: ${{ github.event.inputs.store_alias }}
          TEST_URL: ${{ env.TEST_URL }}

      - name: Save fallback products cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/fallbackProducts.json
          key: fallback-products-v1

      - name: Send result to Slack
        if: success() || failure()
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const runUrl = process.env.GITHUB_RUN_URL;

          if (!fs.existsSync('test-output.log')) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const fullLog = fs.readFileSync('test-output.log', 'utf8');

          // Detect flaky count from Playwright summary
          const flakyMatch = fullLog.match(/(\d+)\s+flaky/);
          const flakyCount = flakyMatch ? parseInt(flakyMatch[1], 10) : 0;

          const lines = fullLog
            .split('\n')
            .filter(l => l.includes('QA_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const finalResults = {};
          lines.forEach(line => {
            const json = JSON.parse(line.replace(/^.*QA_RESULT:\s*/, ''));
            finalResults[json.browser] = json;
          });

          const results = Object.values(finalResults);
          const failed = results.filter(r => r.status === "failed");
          const skipped = results.filter(r => r.status === "skipped");

          const testedUrl = results[0]?.url || "";
          let message = "🧪 VS Inpage QA — Result\n\n";
          if (testedUrl) message += `🌐 ${testedUrl}\n\n`;

          // Clean pass
          if (failed.length === 0 && skipped.length === 0 && flakyCount === 0) {
            message += "✅ All browsers passed cleanly\n";
          }

          // Flaky detected
          if (flakyCount > 0) {
            message += `⚠️ ${flakyCount} Flaky test detected (passed on retry)\n`;
          }

          // Skipped
          if (skipped.length > 0) {
            skipped.forEach(r => {
              message += `⏭ ${r.browser}: skipped (${r.reason || "No reason"})\n`;
            });
          }

          // Failed
          if (failed.length > 0) {
            failed.forEach(r => {
              message += `❌ ${r.browser}: failed\n`;
              if (r.error) {
                message += `   ↳ ${r.error}\n`;
              }
            });
          }

          message += `\n🔗 ${runUrl}`;

          execSync(`curl -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${webhook}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
