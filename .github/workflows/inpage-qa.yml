name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test
        run: npx playwright test tests/inpage.spec.js --workers=1
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Send result to Slack
        if: always()
        run: |
          RESULT=$(grep "QA_RESULT:" -r . | tail -1 | sed 's/QA_RESULT: //')

          TEXT=$(echo "$RESULT" | jq -r '
          if .status == "PASS" then
            "*VS QA Result*\nURL: \(.url)\nStore: \(.store)\nProduct: \(.productType)\nUser: \(.userType)\nStatus: PASS\nDuration: \(.durationMs) ms"
          elif .status == "SKIPPED" then
            "*VS QA Result*\nURL: \(.url)\nStore: \(.store)\nProduct: \(.productType)\nStatus: SKIPPED (\(.reason))"
          else
            "*VS QA Result*\nURL: \(.url)\nStatus: FAIL\nError: \(.error)"
          end
          ')

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\": \"$TEXT\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}
