name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test (all browsers)
        run: |
          npx playwright test tests/inpage.spec.js --workers=1 | tee qa-output.log
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Send result to Slack
        if: always()
        run: |
          RESULTS=$(grep "QA_RESULT:" qa-output.log | sed 's/QA_RESULT: //')

          TEXT="VS Inpage Events — Multi-Browser Result"

          while read -r line; do
          STATUS=$(echo "$line" | jq -r '.status')
           BROWSER=$(echo "$line" | jq -r '.browser')
           URL=$(echo "$line" | jq -r '.url')

      TEXT="${TEXT}\n• ${BROWSER}: ${STATUS}"
    done <<< "$RESULTS"

          TEXT="$TEXT\n\nURL: $URL"
          TEXT="$TEXT\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          jq -n --arg text "$TEXT" '{text: $text}' \
            | curl -X POST \
              -H 'Content-type: application/json' \
              --data @- \
              ${{ secrets.SLACK_WEBHOOK_URL }}
