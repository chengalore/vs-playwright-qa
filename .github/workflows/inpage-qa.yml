name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Send result to Slack
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const runUrl = process.env.GITHUB_RUN_URL;

          if (!fs.existsSync('test-output.log')) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const fullLog = fs.readFileSync('test-output.log', 'utf8');

          // Detect flaky count from Playwright summary
          const flakyMatch = fullLog.match(/(\d+)\s+flaky/);
          const flakyCount = flakyMatch ? parseInt(flakyMatch[1], 10) : 0;

          const lines = fullLog
            .split('\n')
            .filter(l => l.includes('QA_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const finalResults = {};
          lines.forEach(line => {
            const json = JSON.parse(line.replace(/^.*QA_RESULT:\s*/, ''));
            finalResults[json.browser] = json;
          });

          const results = Object.values(finalResults);
          const failed = results.filter(r => r.status === "failed");
          const skipped = results.filter(r => r.status === "skipped");

          let message = "🧪 VS Inpage QA — Result\n\n";

          // Clean pass
          if (failed.length === 0 && skipped.length === 0 && flakyCount === 0) {
            message += "✅ All browsers passed cleanly\n";
          }

          // Flaky detected
          if (flakyCount > 0) {
            message += `⚠️ ${flakyCount} Flaky test detected (passed on retry)\n`;
          }

          // Skipped
          if (skipped.length > 0) {
            skipped.forEach(r => {
              message += `⏭ ${r.browser}: skipped (${r.reason || "No reason"})\n`;
            });
          }

          // Failed
          if (failed.length > 0) {
            failed.forEach(r => {
              message += `❌ ${r.browser}: failed\n`;
              if (r.error) {
                message += `   ↳ ${r.error}\n`;
              }
            });
          }

          message += `\n🔗 ${runUrl}`;

          execSync(`curl -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${webhook}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
