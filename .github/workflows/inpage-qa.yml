name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Parse slash command input
        run: |
          node --input-type=module <<'EOF'
          import { parseSlashCommand } from './utils/parseSlashCommand.js';
          import { appendFileSync } from 'fs';

          const input = process.env.QA_INPUT ?? '';
          const params = parseSlashCommand(input);
          const env = process.env.GITHUB_ENV;

          const write = (key, value) => {
            appendFileSync(env, `${key}=${value}\n`);
            console.log(`  ${key}=${value}`);
          };

          console.log(`Parsed "${input}" →`, params);

          if (params.testUrl) {
            write('TEST_URL', params.testUrl);
          } else {
            if (params.store_id !== undefined)       write('STORE_ID', params.store_id);
            if (params.api_key !== undefined)        write('API_KEY', params.api_key);
            if (params.product_type_id !== undefined) write('PRODUCT_TYPE_ID', params.product_type_id);
            if (params.gender !== undefined)         write('GENDER', params.gender);
            if (params.category !== undefined)       write('CATEGORY', params.category);
            if (params.exclude_kids !== undefined)   write('EXCLUDE_KIDS', params.exclude_kids);
            if (params.valid !== undefined)          write('VALID', params.valid);
          }
          EOF
        env:
          QA_INPUT: ${{ github.event.inputs.url }}

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ env.TEST_URL }}
          STORE_ID: ${{ env.STORE_ID }}
          API_KEY: ${{ env.API_KEY }}
          PRODUCT_TYPE_ID: ${{ env.PRODUCT_TYPE_ID }}
          GENDER: ${{ env.GENDER }}
          CATEGORY: ${{ env.CATEGORY }}
          EXCLUDE_KIDS: ${{ env.EXCLUDE_KIDS }}
          VALID: ${{ env.VALID }}

      - name: Send result to Slack
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const runUrl = process.env.GITHUB_RUN_URL;

          if (!fs.existsSync('test-output.log')) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const fullLog = fs.readFileSync('test-output.log', 'utf8');

          // Detect flaky count from Playwright summary
          const flakyMatch = fullLog.match(/(\d+)\s+flaky/);
          const flakyCount = flakyMatch ? parseInt(flakyMatch[1], 10) : 0;

          const lines = fullLog
            .split('\n')
            .filter(l => l.includes('QA_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const finalResults = {};
          lines.forEach(line => {
            const json = JSON.parse(line.replace(/^.*QA_RESULT:\s*/, ''));
            finalResults[json.browser] = json;
          });

          const results = Object.values(finalResults);
          const failed = results.filter(r => r.status === "failed");
          const skipped = results.filter(r => r.status === "skipped");

          let message = "🧪 VS Inpage QA — Result\n\n";

          // Clean pass
          if (failed.length === 0 && skipped.length === 0 && flakyCount === 0) {
            message += "✅ All browsers passed cleanly\n";
          }

          // Flaky detected
          if (flakyCount > 0) {
            message += `⚠️ ${flakyCount} Flaky test detected (passed on retry)\n`;
          }

          // Skipped
          if (skipped.length > 0) {
            skipped.forEach(r => {
              message += `⏭ ${r.browser}: skipped (${r.reason || "No reason"})\n`;
            });
          }

          // Failed
          if (failed.length > 0) {
            failed.forEach(r => {
              message += `❌ ${r.browser}: failed\n`;
              if (r.error) {
                message += `   ↳ ${r.error}\n`;
              }
            });
          }

          message += `\n🔗 ${runUrl}`;

          execSync(`curl -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${webhook}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
