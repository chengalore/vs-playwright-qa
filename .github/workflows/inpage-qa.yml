name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Install jq
        if: always()
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send result to Slack
        if: always()
        run: |
          RESULTS=$(grep 'QA_RESULT:' test-output.log | sed 's/.*QA_RESULT: //')

          if [ -z "$RESULTS" ]; then
            MESSAGE="❌ QA_RESULT not found"
          else
            MESSAGE="🧪 VS Inpage QA — Result\n\n"
            OVERALL="passed"

            while read -r line; do
              STATUS=$(echo "$line" | jq -r '.status')
              BROWSER=$(echo "$line" | jq -r '.browser')

              if [ "$STATUS" = "passed" ]; then
                ICON="✅"
              elif [ "$STATUS" = "skipped" ]; then
                ICON="⏭"
              else
                ICON="❌"
                OVERALL="failed"
              fi

              MESSAGE="${MESSAGE}${ICON} ${BROWSER}: ${STATUS}\n"
            done <<< "$RESULTS"

            MESSAGE="${MESSAGE}\nOverall: ${OVERALL}"
          fi

          curl -X POST \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
