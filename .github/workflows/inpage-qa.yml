name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test
        run: npx playwright test tests/inpage.spec.js
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Install jq
        if: always()
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Send result to Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"

          if [ "$STATUS" = "success" ]; then
            ICON="✅"
          else
            ICON="❌"
          fi

          MESSAGE="*🧪 VS Inpage QA — Result*\n\n"
          MESSAGE="${MESSAGE}${ICON} Overall status: ${STATUS}\n\n"
          MESSAGE="${MESSAGE}🔗 URL: ${{ github.event.inputs.url }}\n"
          MESSAGE="${MESSAGE}🏃 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg text "$MESSAGE" '{text: $text}')" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
