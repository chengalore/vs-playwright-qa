name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test
        run: npx playwright test tests/inpage.spec.js
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Send result to Slack
        if: always()
        run: |
          TEXT="*🧪 VS Inpage QA — Result*"

          if [ -f test-results.json ]; then

            RESULTS=$(jq -r '
              .suites[].specs[].tests[] |
              "\(.projectName)|\(.results[-1].status)"
            ' test-results.json | sort -u)

            if [ -z "$RESULTS" ]; then
              TEXT="${TEXT}
❌ No test results found in JSON"
            else
              while IFS="|" read -r browser status; do
                if [ "$status" = "passed" ]; then
                  ICON="✅"
                elif [ "$status" = "flaky" ]; then
                  ICON="🟡"
                else
                  ICON="❌"
                fi

                TEXT="${TEXT}
${ICON} ${browser}: ${status}"
              done <<< "$RESULTS"
            fi

          else
            TEXT="${TEXT}
❌ No test-results.json found"
          fi

          TEXT="${TEXT}

🔗 URL: ${{ github.event.inputs.url }}
🏃 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg text "$TEXT" '{text: $text}')" \
            ${{ secrets.SLACK_WEBHOOK_URL }}