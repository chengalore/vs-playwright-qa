name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - run: npx playwright test tests/inpage.spec.js
        env:
          TEST_URL: ${{ github.event.inputs.url }}
