name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Parse slash command input
        run: |
          INPUT="${{ github.event.inputs.url }}"
          echo "Input: $INPUT"

          # If it looks like a URL, pass through directly
          if [[ "$INPUT" == http* ]]; then
            echo "TEST_URL=$INPUT" >> $GITHUB_ENV
            echo "→ TEST_URL=$INPUT"
            exit 0
          fi

          # Normalise: lowercase, collapse whitespace
          TOKENS=$(echo "$INPUT" | tr '[:upper:]' '[:lower:]' | tr '_-' '  ' | tr -s ' ')

          for TOKEN in $TOKENS; do
            case "$TOKEN" in
              # ── Store aliases ──────────────────────────────────
              ua|underarmour|underarmourjapan)
                echo "STORE_ID=805" >> $GITHUB_ENV
                echo "→ STORE_ID=805 ($TOKEN)" ;;

              # ── Product type aliases ───────────────────────────
              shoe|shoes|footwear)
                echo "PRODUCT_TYPE_ID=17" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=17 ($TOKEN)" ;;
              tshirt|tshirts|top|tops)
                echo "PRODUCT_TYPE_ID=2" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=2 ($TOKEN)" ;;
              pant|pants|bottoms)
                echo "PRODUCT_TYPE_ID=4" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=4 ($TOKEN)" ;;
              dress|dresses)
                echo "PRODUCT_TYPE_ID=6" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=6 ($TOKEN)" ;;
              jacket|jackets|coat|coats)
                echo "PRODUCT_TYPE_ID=7" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=7 ($TOKEN)" ;;
              skirt|skirts)
                echo "PRODUCT_TYPE_ID=8" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=8 ($TOKEN)" ;;
              short|shorts)
                echo "PRODUCT_TYPE_ID=10" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=10 ($TOKEN)" ;;
              sweater|sweaters|hoodie|hoodies)
                echo "PRODUCT_TYPE_ID=13" >> $GITHUB_ENV
                echo "→ PRODUCT_TYPE_ID=13 ($TOKEN)" ;;

              # ── Gender aliases ─────────────────────────────────
              kid|kids|children|child|boys|girls)
                echo "GENDER=kids" >> $GITHUB_ENV
                echo "→ GENDER=kids ($TOKEN)" ;;
              male|men|man)
                echo "GENDER=male" >> $GITHUB_ENV
                echo "→ GENDER=male ($TOKEN)" ;;
              female|women|woman)
                echo "GENDER=female" >> $GITHUB_ENV
                echo "→ GENDER=female ($TOKEN)" ;;
              unisex)
                echo "GENDER=unisex" >> $GITHUB_ENV
                echo "→ GENDER=unisex ($TOKEN)" ;;

              # ── Raw numeric store ID ───────────────────────────
              [0-9]*)
                echo "STORE_ID=$TOKEN" >> $GITHUB_ENV
                echo "→ STORE_ID=$TOKEN (numeric)" ;;

              *)
                echo "⚠️ Unrecognised token: $TOKEN" ;;
            esac
          done

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ env.TEST_URL }}
          STORE_ID: ${{ env.STORE_ID }}
          API_KEY: ${{ env.API_KEY }}
          PRODUCT_TYPE_ID: ${{ env.PRODUCT_TYPE_ID }}
          GENDER: ${{ env.GENDER }}
          CATEGORY: ${{ env.CATEGORY }}
          EXCLUDE_KIDS: ${{ env.EXCLUDE_KIDS }}
          VALID: ${{ env.VALID }}

      - name: Send result to Slack
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const runUrl = process.env.GITHUB_RUN_URL;

          if (!fs.existsSync('test-output.log')) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const fullLog = fs.readFileSync('test-output.log', 'utf8');

          // Detect flaky count from Playwright summary
          const flakyMatch = fullLog.match(/(\d+)\s+flaky/);
          const flakyCount = flakyMatch ? parseInt(flakyMatch[1], 10) : 0;

          const lines = fullLog
            .split('\n')
            .filter(l => l.includes('QA_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${webhook}`);
            process.exit(0);
          }

          const finalResults = {};
          lines.forEach(line => {
            const json = JSON.parse(line.replace(/^.*QA_RESULT:\s*/, ''));
            finalResults[json.browser] = json;
          });

          const results = Object.values(finalResults);
          const failed = results.filter(r => r.status === "failed");
          const skipped = results.filter(r => r.status === "skipped");

          let message = "🧪 VS Inpage QA — Result\n\n";

          // Clean pass
          if (failed.length === 0 && skipped.length === 0 && flakyCount === 0) {
            message += "✅ All browsers passed cleanly\n";
          }

          // Flaky detected
          if (flakyCount > 0) {
            message += `⚠️ ${flakyCount} Flaky test detected (passed on retry)\n`;
          }

          // Skipped
          if (skipped.length > 0) {
            skipped.forEach(r => {
              message += `⏭ ${r.browser}: skipped (${r.reason || "No reason"})\n`;
            });
          }

          // Failed
          if (failed.length > 0) {
            failed.forEach(r => {
              message += `❌ ${r.browser}: failed\n`;
              if (r.error) {
                message += `   ↳ ${r.error}\n`;
              }
            });
          }

          message += `\n🔗 ${runUrl}`;

          execSync(`curl -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${webhook}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
