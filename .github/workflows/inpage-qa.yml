name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright test
        run: npx playwright test tests/inpage.spec.js
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report

      - name: Send result to Slack
        if: always()
        run: |
          TEXT="*🧪 VS Inpage QA — Result*"

          if [ -f test-results.json ]; then
            BROWSERS=$(jq -r '.suites[].specs[].tests[].projectName' test-results.json | sort -u)

            for browser in $BROWSERS; do
              STATUS=$(jq -r \
                ".suites[].specs[].tests[] | select(.projectName==\"$browser\") | .results[-1].status" \
                test-results.json | tail -n 1)

              if [ "$STATUS" = "passed" ]; then
                ICON="✅"
              elif [ "$STATUS" = "flaky" ]; then
                ICON="🟡"
              else
                ICON="❌"
              fi

              TEXT="${TEXT}
${ICON} ${browser}: ${STATUS}"
            done
          else
            TEXT="${TEXT}
❌ test-results.json not found"
          fi

          TEXT="${TEXT}

🔗 URL: ${{ github.event.inputs.url }}
🏃 Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -X POST \
            -H "Content-type: application/json" \
            --data "$(jq -n --arg text "$TEXT" '{text: $text}')" \
            ${{ secrets.SLACK_WEBHOOK_URL }}