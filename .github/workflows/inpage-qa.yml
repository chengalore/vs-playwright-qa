name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "PDP URL to test"
        required: true
        type: string

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps

      - name: Run Playwright test
        run: |
          npx playwright test tests/inpage.spec.js | tee test-output.log
        env:
          TEST_URL: ${{ github.event.inputs.url }}

      - name: Send result to Slack
        if: always()
        run: |
          node <<'EOF'
          const fs = require('fs');
          const { execSync } = require('child_process');

          if (!fs.existsSync('test-output.log')) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${process.env.SLACK_WEBHOOK_URL}`);
            process.exit(0);
          }

          const lines = fs.readFileSync('test-output.log', 'utf8')
            .split('\n')
            .filter(l => l.includes('QA_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -X POST \
              -H "Content-type: application/json" \
              --data '{"text":"❌ QA_RESULT not found"}' \
              ${process.env.SLACK_WEBHOOK_URL}`);
            process.exit(0);
          }

          let message = "🧪 VS Inpage QA — Result\n\n";
          let overall = "passed";

          lines.forEach(line => {
            const json = JSON.parse(line.replace(/^.*QA_RESULT:\s*/, ''));

            const icon =
              json.status === "passed" ? "✅" :
              json.status === "skipped" ? "⏭" :
              (overall = "failed", "❌");

            message += `${icon} ${json.browser}: ${json.status}\n`;
          });

          message += `\nOverall: ${overall}`;

          execSync(`curl -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${process.env.SLACK_WEBHOOK_URL}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
