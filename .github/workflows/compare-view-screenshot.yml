name: Compare View Screenshot

on:
  workflow_dispatch:
    inputs:
      urls:
        description: "Product page URLs (one per line)"
        required: true
        type: string

jobs:
  screenshot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps chrome

      - name: Write URLs file
        run: |
          echo "${{ github.event.inputs.urls }}" > data/compare-view-urls-run.txt
          echo "URLs to test:"
          cat data/compare-view-urls-run.txt

      - name: Run compare view screenshot test
        run: |
          npx playwright test tests/compare-view-screenshot.spec.js \
            --project=chrome \
            --workers=1 \
            --retries=0 \
            --reporter=list 2>&1 | tee test-output.log
        env:
          TEST_URLS_FILE: data/compare-view-urls-run.txt

      - name: Publish to GitHub Pages
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git pull --rebase origin ${{ github.ref_name }}
          for i in 1 2 3; do
            node scripts/build-dashboard.js
            git add docs/
            git diff --staged --quiet && { echo "Nothing new to publish"; break; }
            git commit -m "chore: publish compare view screenshots [skip ci]"
            git push origin HEAD:${{ github.ref_name }} && break
            echo "Push attempt $i failed, retrying..."
            git reset HEAD~1
            git restore docs/ 2>/dev/null || git checkout -- docs/
            git pull --rebase origin ${{ github.ref_name }}
            sleep 5
          done
        env:
          PHASE: skip
