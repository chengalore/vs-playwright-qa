name: Inpage QA

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Product page URL (optional — leave empty to resolve via store_alias/store_id)"
        required: false
        default: ""
        type: string
      store_alias:
        description: "Store alias e.g. snidel — used for URL resolution and fallback tracking"
        required: false
        default: ""
        type: string
      store_id:
        description: "Store ID filter"
        required: false
        default: ""
        type: string
      product_type_id:
        description: "Product type ID filter"
        required: false
        default: ""
        type: string
      gender:
        description: "Gender filter"
        required: false
        default: ""
        type: string
      exclude_kids:
        description: "Exclude kids products"
        required: false
        default: ""
        type: string
      phase:
        description: "Test phase (widget/events/api/onboarding/compare/full)"
        required: false
        default: "full"
        type: string
      onboarding_gender:
        description: "Onboarding gender — 0=female, 1=male (apparel/noVisor only)"
        required: false
        default: "0"
        type: string
      onboarding_age:
        description: "Onboarding age in years (apparel/noVisor only)"
        required: false
        default: "35"
        type: string
      onboarding_height:
        description: "Onboarding height in cm (apparel/noVisor only)"
        required: false
        default: "161"
        type: string
      onboarding_weight:
        description: "Onboarding weight in kg (apparel/noVisor only)"
        required: false
        default: "54"
        type: string
      gift_gender:
        description: "Gift gender — 0=female, 1=male (apparel only)"
        required: false
        default: "0"
        type: string
      gift_age:
        description: "Gift age index — 0=16-19, 1=20-25, 2=26-29, 3=30-39, 4=40-49, 5=50-59, 6=>60"
        required: false
        default: "3"
        type: string
      gift_height:
        description: "Gift height index — 0=145-149cm, 1=150-154cm … 10=195+cm"
        required: false
        default: "3"
        type: string
      gift_body_type:
        description: "Gift body type index — 0=<52kg, 1=52-63, 2=63-74, 3=74-84, 4=85-98, 5=>98kg"
        required: false
        default: "1"
        type: string
      footwear_gender:
        description: "Footwear gender — 0=female, 1=male"
        required: false
        default: "0"
        type: string
      footwear_brand:
        description: "Footwear brand index — 0=UA,1=Adidas,2=Asics,3=Converse,4=NB,5=Nike,6=Puma,7=Reebok,8=Vans,9=I don't know"
        required: false
        default: "1"
        type: string
      footwear_size:
        description: "Footwear size index — 0=17cm,1=17.5cm … 36=35cm (default 17→25.5cm)"
        required: false
        default: "17"
        type: string
      kids_gender:
        description: "Kids gender — 0=girl, 1=boy"
        required: false
        default: "0"
        type: string
      kids_age:
        description: "Kids age radio index — 0=3yr, 1=4yr … 15=18yr (default 5 → 8yr)"
        required: false
        default: "5"
        type: string
      kids_height:
        description: "Kids height in cm"
        required: false
        default: "120"
        type: string
      kids_weight:
        description: "Kids weight in kg"
        required: false
        default: "25"
        type: string
      slack_response_url:
        description: "Slack response_url for posting result back to the user"
        required: false
        default: ""
        type: string

jobs:
  # ── Run in 3 browsers in parallel ─────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        browser: [chrome, firefox, webkit]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run inpage test
        run: |
          npx playwright test tests/inpage.spec.js \
            --project=${{ matrix.browser }} \
            --retries=0 \
            --reporter=list 2>&1 | tee test-output.log
        env:
          TEST_URL: ${{ github.event.inputs.url }}
          STORE_ID: ${{ github.event.inputs.store_id }}
          PRODUCT_TYPE_ID: ${{ github.event.inputs.product_type_id }}
          GENDER: ${{ github.event.inputs.gender }}
          EXCLUDE_KIDS: ${{ github.event.inputs.exclude_kids }}
          TEST_PHASE: ${{ github.event.inputs.phase }}
          ONBOARDING_GENDER: ${{ github.event.inputs.onboarding_gender }}
          ONBOARDING_AGE: ${{ github.event.inputs.onboarding_age }}
          ONBOARDING_HEIGHT: ${{ github.event.inputs.onboarding_height }}
          ONBOARDING_WEIGHT: ${{ github.event.inputs.onboarding_weight }}
          GIFT_GENDER: ${{ github.event.inputs.gift_gender }}
          GIFT_AGE: ${{ github.event.inputs.gift_age }}
          GIFT_HEIGHT: ${{ github.event.inputs.gift_height }}
          GIFT_BODY_TYPE: ${{ github.event.inputs.gift_body_type }}
          FOOTWEAR_GENDER: ${{ github.event.inputs.footwear_gender }}
          FOOTWEAR_BRAND: ${{ github.event.inputs.footwear_brand }}
          FOOTWEAR_SIZE: ${{ github.event.inputs.footwear_size }}
          KIDS_GENDER: ${{ github.event.inputs.kids_gender }}
          KIDS_AGE: ${{ github.event.inputs.kids_age }}
          KIDS_HEIGHT: ${{ github.event.inputs.kids_height }}
          KIDS_WEIGHT: ${{ github.event.inputs.kids_weight }}
          RANDOM_PRODUCT_API_URL: ${{ secrets.RANDOM_PRODUCT_API_URL }}

      - name: Save result
        if: always()
        run: |
          node --input-type=module <<'SCRIPT'
          import fs from 'fs';

          const log = fs.existsSync('test-output.log') ? fs.readFileSync('test-output.log', 'utf8') : '';
          const resultLine = log.split('\n').reverse().find(l => l.includes('QA_RESULT:'));
          const browser = process.env.BROWSER;

          let result;
          if (resultLine) {
            result = JSON.parse(resultLine.replace(/^.*QA_RESULT:\s*/, ''));
          } else {
            const failed = log.includes('failed') || log.includes('Error');
            result = { status: failed ? 'failed' : 'unknown', error: 'No QA_RESULT in output' };
          }
          result.browser = browser;

          fs.writeFileSync(`result-${browser}.json`, JSON.stringify(result));
          console.log(`Saved result for ${browser}:`, result.status);
          SCRIPT
        env:
          BROWSER: ${{ matrix.browser }}

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result-${{ matrix.browser }}
          path: result-${{ matrix.browser }}.json
          retention-days: 1

      - name: Upload compare view screenshots
        if: ${{ github.event.inputs.phase == 'compare' }}
        uses: actions/upload-artifact@v4
        with:
          name: compare-screenshots-${{ matrix.browser }}
          path: test-results/compare-view-screenshots/
          retention-days: 1

  # ── Post result to Slack ───────────────────────────────────────────────────
  notify:
    needs: test
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: results/

      - name: Post result to Slack
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';

          const responseUrl = process.env.SLACK_RESPONSE_URL;
          const webhook = process.env.SLACK_WEBHOOK_URL;
          const target = responseUrl || webhook;
          if (!target) { console.log('No Slack target — skipping'); process.exit(0); }

          const browsers = ['chrome', 'firefox', 'webkit'];
          const results = browsers.map(b => {
            const file = `results/result-${b}.json`;
            if (!fs.existsSync(file)) return { browser: b, status: 'failed', error: 'No result file' };
            return JSON.parse(fs.readFileSync(file, 'utf8'));
          });

          const runUrl = process.env.GITHUB_RUN_URL;
          const iconFor = s => s === 'passed' ? '✅' : s === 'skipped' ? '⏭️' : '❌';
          const browserLine = results.map(r => `${iconFor(r.status)} ${r.browser}`).join('  ');
          const first = results.find(r => r.store) || results[0];
          const testedUrl = first.url || process.env.TEST_URL;
          const errors = results.filter(r => r.error && r.status !== 'skipped');

          const parts = [
            `🧪 Inpage QA — ${browserLine}`,
            first.store ? `*Store:* ${first.store}` : null,
            first.productType ? `*Type:* ${first.productType}` : null,
            ...errors.map(r => `*${r.browser}:* ${r.error}`),
            testedUrl
              ? `<${testedUrl}|Product page> · <${runUrl}|View run>`
              : `<${runUrl}|View run>`,
          ].filter(Boolean).join('\n');

          const res = await fetch(target, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: parts }),
          });
          console.log('Slack response:', res.status);
          EOF
        env:
          SLACK_RESPONSE_URL: ${{ github.event.inputs.slack_response_url }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          TEST_URL: ${{ github.event.inputs.url }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

  # ── Save fallback + publish to GitHub Pages ────────────────────────────────
  publish:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: result-*
          merge-multiple: true
          path: results/

      - name: Save fallback and append to history
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';

          const HISTORY_FILE = 'data/single-url-history.json';
          const MAX_HISTORY = 100;

          const browsers = ['chrome', 'firefox', 'webkit'];
          const browserResults = browsers.map(b => {
            const file = `results/result-${b}.json`;
            if (!fs.existsSync(file)) return { browser: b, status: 'no_result' };
            return JSON.parse(fs.readFileSync(file, 'utf8'));
          });

          const first = browserResults.find(r => r.store) || browserResults[0];
          const resolvedUrl = first.url || process.env.TEST_URL || null;

          // Save fallback if any browser passed and store_alias is provided
          const alias = process.env.STORE_ALIAS;
          const anyPassed = browserResults.some(r => r.status === 'passed');
          if (alias && resolvedUrl && anyPassed) {
            const FALLBACK_FILE = 'data/fallbackProducts.json';
            const fallbacks = fs.existsSync(FALLBACK_FILE)
              ? JSON.parse(fs.readFileSync(FALLBACK_FILE, 'utf8'))
              : {};
            fallbacks[alias] = resolvedUrl;
            fs.writeFileSync(FALLBACK_FILE, JSON.stringify(fallbacks, null, 2));
            console.log(`Saved fallback: ${alias} → ${resolvedUrl}`);
          }

          // Append to single-url history
          const onboarding = {
            gender: process.env.ONBOARDING_GENDER === '1' ? 'male' : 'female',
            age:    process.env.ONBOARDING_AGE    || '35',
            height: process.env.ONBOARDING_HEIGHT || '161',
            weight: process.env.ONBOARDING_WEIGHT || '54',
          };

          const GIFT_AGES        = ['16-19','20-25','26-29','30-39','40-49','50-59','>60'];
          const GIFT_HEIGHTS     = ['145-149','150-154','155-159','160-164','165-169','170-174','175-179','180-184','185-189','190-194','195+'];
          const GIFT_BODY_TYPES  = ['<52 kg','52-63 kg','63-74 kg','74-84 kg','85-98 kg','>98 kg'];
          const giftOnboarding = {
            gender:   process.env.GIFT_GENDER === '1' ? 'male' : 'female',
            age:      GIFT_AGES[parseInt(process.env.GIFT_AGE || '3', 10)]        || GIFT_AGES[3],
            height:   GIFT_HEIGHTS[parseInt(process.env.GIFT_HEIGHT || '3', 10)]  || GIFT_HEIGHTS[3],
            bodyType: GIFT_BODY_TYPES[parseInt(process.env.GIFT_BODY_TYPE || '1', 10)] || GIFT_BODY_TYPES[1],
          };

          const BRANDS = ['Under Armour','Adidas','Asics','Converse','New Balance','Nike','Puma','Reebok','Vans',"I don't know"];
          const footwearSizeIdx = parseInt(process.env.FOOTWEAR_SIZE || '17', 10);
          const footwearOnboarding = {
            gender: process.env.FOOTWEAR_GENDER === '1' ? 'male' : 'female',
            brand:  BRANDS[parseInt(process.env.FOOTWEAR_BRAND || '1', 10)] || BRANDS[1],
            size:   (17 + footwearSizeIdx * 0.5).toFixed(1).replace('.0', '') + ' cm',
          };

          const kidsAgeIdx = parseInt(process.env.KIDS_AGE || '5', 10);
          const kidsOnboarding = {
            gender: process.env.KIDS_GENDER === '1' ? 'boy' : 'girl',
            age:    kidsAgeIdx + 3,  // index → actual year (0→3yr, 5→8yr …)
            height: process.env.KIDS_HEIGHT || '120',
            weight: process.env.KIDS_WEIGHT || '25',
          };

          const entry = {
            timestamp: new Date().toISOString(),
            url: resolvedUrl,
            phase: process.env.PHASE,
            githubRunUrl: process.env.GITHUB_RUN_URL,
            store: first.store || null,
            productType: first.productType || null,
            flow: first.flow || null,
            onboarding,
            giftOnboarding,
            footwearOnboarding,
            kidsOnboarding,
            events: first.events || [],
            browsers: browserResults.map(r => ({ browser: r.browser, status: r.status, error: r.error || null })),
          };

          fs.mkdirSync('data', { recursive: true });
          const history = fs.existsSync(HISTORY_FILE)
            ? JSON.parse(fs.readFileSync(HISTORY_FILE, 'utf8'))
            : [];
          history.unshift(entry);
          if (history.length > MAX_HISTORY) history.splice(MAX_HISTORY);
          fs.writeFileSync(HISTORY_FILE, JSON.stringify(history, null, 2));
          console.log(`single-url-history updated — ${history.length} entries`);
          EOF
        env:
          STORE_ALIAS: ${{ github.event.inputs.store_alias }}
          TEST_URL: ${{ github.event.inputs.url }}
          PHASE: ${{ github.event.inputs.phase }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ONBOARDING_GENDER: ${{ github.event.inputs.onboarding_gender }}
          ONBOARDING_AGE: ${{ github.event.inputs.onboarding_age }}
          ONBOARDING_HEIGHT: ${{ github.event.inputs.onboarding_height }}
          ONBOARDING_WEIGHT: ${{ github.event.inputs.onboarding_weight }}
          GIFT_GENDER: ${{ github.event.inputs.gift_gender }}
          GIFT_AGE: ${{ github.event.inputs.gift_age }}
          GIFT_HEIGHT: ${{ github.event.inputs.gift_height }}
          GIFT_BODY_TYPE: ${{ github.event.inputs.gift_body_type }}
          FOOTWEAR_GENDER: ${{ github.event.inputs.footwear_gender }}
          FOOTWEAR_BRAND: ${{ github.event.inputs.footwear_brand }}
          FOOTWEAR_SIZE: ${{ github.event.inputs.footwear_size }}
          KIDS_GENDER: ${{ github.event.inputs.kids_gender }}
          KIDS_AGE: ${{ github.event.inputs.kids_age }}
          KIDS_HEIGHT: ${{ github.event.inputs.kids_height }}
          KIDS_WEIGHT: ${{ github.event.inputs.kids_weight }}

      - name: Download compare view screenshots
        if: ${{ github.event.inputs.phase == 'compare' }}
        uses: actions/download-artifact@v4
        with:
          pattern: compare-screenshots-*
          merge-multiple: true
          path: test-results/compare-view-screenshots/

      - name: Rebuild dashboard
        run: node scripts/build-dashboard.js
        env:
          PHASE: skip

      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/single-url-history.json data/fallbackProducts.json docs/index.html docs/compare-view-screenshots/
          git diff --staged --quiet || git commit -m "chore: update inpage QA result [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
