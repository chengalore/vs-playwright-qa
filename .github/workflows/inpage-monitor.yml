name: Inpage Monitor

on:
  workflow_dispatch:
    inputs:
      phase:
        description: "Test phase (widget/api)"
        required: false
        default: "widget"
        type: string
      store_id:
        description: "Optional: single store ID to filter"
        required: false
        default: ""
        type: string
      product_type_id:
        description: "Optional: product type ID filter"
        required: false
        default: ""
        type: string
      gender:
        description: "Optional: gender filter"
        required: false
        default: ""
        type: string

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - name: Restore fallback products cache
        uses: actions/cache@v4
        with:
          path: data/fallbackProducts.json
          key: fallback-products-v2
          restore-keys: fallback-products-v2

      - name: Restore store health cache
        uses: actions/cache@v4
        with:
          path: data/storeHealth.json
          key: store-health-v1
          restore-keys: store-health-v1

      - name: Resolve store URLs
        run: |
          node --input-type=module <<'SCRIPT'
          import { MONITOR_STORES } from './config/monitorStores.js';
          import { fetchRandomProduct } from './utils/fetchRandomProduct.js';
          import { readFileSync, writeFileSync, existsSync, mkdirSync } from 'fs';

          const storeIdFilter = process.env.STORE_ID ? Number(process.env.STORE_ID) : null;
          const productTypeId = process.env.PRODUCT_TYPE_ID ? Number(process.env.PRODUCT_TYPE_ID) : undefined;
          const gender = process.env.GENDER || undefined;

          // Read fallbackProducts.json directly (avoids import.meta.url path issues in stdin scripts)
          const FALLBACK_FILE = 'data/fallbackProducts.json';
          const fallbacks = existsSync(FALLBACK_FILE)
            ? JSON.parse(readFileSync(FALLBACK_FILE, 'utf8'))
            : {};
          const getFallback = (alias) => fallbacks[alias] ?? null;

          // Read store health to skip auto-blacklisted stores
          const HEALTH_FILE = 'data/storeHealth.json';
          const health = existsSync(HEALTH_FILE)
            ? JSON.parse(readFileSync(HEALTH_FILE, 'utf8'))
            : {};

          // Use canonical store list — skip auto-blacklisted stores
          const storeEntries = Object.entries(MONITOR_STORES)
            .filter(([alias, storeId]) => {
              if (storeIdFilter && storeId !== storeIdFilter) return false;
              if (health[alias]?.autoBlacklisted) {
                console.log(`[${alias}] Auto-blacklisted (${health[alias].consecutiveFailures} consecutive failures) — skipping`);
                return false;
              }
              return true;
            });

          console.log(`Resolving URLs for ${storeEntries.length} stores...`);

          const results = await Promise.all(
            storeEntries.map(async ([alias, storeId]) => {
              // Priority: 1. fallbackProducts.json  2. Random Product API (last resort)
              const fallback = getFallback(alias);
              if (fallback) {
                console.log(`[${alias}] Using fallback URL`);
                return { storeAlias: alias, storeId, url: fallback, fromFallback: true };
              }
              try {
                console.log(`[${alias}] No fallback — calling Random Product API`);
                const url = await fetchRandomProduct({
                  store_id: storeId,
                  product_type_id: productTypeId,
                  gender,
                });
                return { storeAlias: alias, storeId, url };
              } catch (err) {
                console.log(`[${alias}] No URL: ${err.message}`);
                return { storeAlias: alias, storeId, url: null };
              }
            })
          );

          const resolved = results.filter(r => r.url).length;
          console.log(`Resolved ${resolved}/${results.length} store URLs`);

          if (resolved === 0) {
            console.error('ERROR: No store URLs resolved — aborting');
            process.exit(1);
          }

          mkdirSync('data', { recursive: true });
          writeFileSync('data/monitor-urls.json', JSON.stringify(results, null, 2));
          console.log(`Wrote ${results.length} entries to data/monitor-urls.json`);
          SCRIPT
        env:
          STORE_ID: ${{ github.event.inputs.store_id }}
          PRODUCT_TYPE_ID: ${{ github.event.inputs.product_type_id }}
          GENDER: ${{ github.event.inputs.gender }}

      - name: Notify Slack - monitor starting
        run: |
          curl -s -X POST \
            -H "Content-type: application/json" \
            --data "{\"text\":\"🏬 VS Monitor starting (phase: ${{ github.event.inputs.phase }})...\"}" \
            "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Run monitor tests
        run: |
          npx playwright test tests/monitor.spec.js --project=chromium --workers=10 --retries=0 | tee monitor-output.log
        env:
          TEST_PHASE: ${{ github.event.inputs.phase }}
          WORKERS: "10"

      - name: Update store health
        if: always()
        run: |
          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync, existsSync } from 'fs';

          const HEALTH_FILE = 'data/storeHealth.json';
          const health = existsSync(HEALTH_FILE)
            ? JSON.parse(readFileSync(HEALTH_FILE, 'utf8'))
            : {};

          if (!existsSync('monitor-output.log')) process.exit(0);

          const log = readFileSync('monitor-output.log', 'utf8');
          const lines = log.split('\n').filter(l => l.includes('MONITOR_RESULT:'));

          // Last result per store
          const byStore = {};
          for (const line of lines) {
            try {
              const json = JSON.parse(line.replace(/^.*MONITOR_RESULT:\s*/, ''));
              byStore[json.storeAlias] = json;
            } catch {}
          }

          const BLACKLIST_THRESHOLD = 3;
          const BOT_STATUSES = new Set(['cdn_blocked', 'navigation_error']);

          for (const [alias, result] of Object.entries(byStore)) {
            if (!health[alias]) health[alias] = { consecutiveFailures: 0 };

            if (BOT_STATUSES.has(result.status)) {
              health[alias].consecutiveFailures = (health[alias].consecutiveFailures || 0) + 1;
              health[alias].lastFailureReason = result.status;
              if (health[alias].consecutiveFailures >= BLACKLIST_THRESHOLD && !health[alias].autoBlacklisted) {
                health[alias].autoBlacklisted = true;
                console.log(`🚫 [${alias}] Auto-blacklisted after ${health[alias].consecutiveFailures} consecutive ${result.status} failures`);
              }
            } else if (result.status === 'passed') {
              if (health[alias].autoBlacklisted) {
                console.log(`✅ [${alias}] Recovered — removing from auto-blacklist`);
              }
              health[alias].consecutiveFailures = 0;
              health[alias].autoBlacklisted = false;
              delete health[alias].lastFailureReason;
            }
            // widget_missing / failed / skipped → leave counter unchanged
          }

          writeFileSync(HEALTH_FILE, JSON.stringify(health, null, 2));
          const blacklisted = Object.values(health).filter(h => h.autoBlacklisted).length;
          console.log(`Store health saved. Auto-blacklisted: ${blacklisted}`);
          SCRIPT

      - name: Save fallback products cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/fallbackProducts.json
          key: fallback-products-v2

      - name: Save store health cache
        if: always()
        uses: actions/cache@v4
        with:
          path: data/storeHealth.json
          key: store-health-v1

      - name: Send Slack summary
        if: success() || failure()
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const runUrl = process.env.GITHUB_RUN_URL;
          const phase = process.env.PHASE;

          if (!fs.existsSync('monitor-output.log')) {
            execSync(`curl -s -X POST -H "Content-type: application/json" --data '{"text":"❌ Monitor output not found"}' ${webhook}`);
            process.exit(0);
          }

          const fullLog = fs.readFileSync('monitor-output.log', 'utf8');
          const lines = fullLog.split('\n').filter(l => l.includes('MONITOR_RESULT:'));

          if (lines.length === 0) {
            execSync(`curl -s -X POST -H "Content-type: application/json" --data '{"text":"❌ No MONITOR_RESULT lines found"}' ${webhook}`);
            process.exit(0);
          }

          // Last result per store alias wins
          const byStore = {};
          for (const line of lines) {
            const json = JSON.parse(line.replace(/^.*MONITOR_RESULT:\s*/, ''));
            byStore[json.storeAlias] = json;
          }

          const results = Object.values(byStore);
          const passed = results.filter(r => r.status === 'passed');
          const widgetMissing = results.filter(r => r.status === 'widget_missing');
          const failed = results.filter(r => r.status === 'failed');
          const skipped = results.filter(r => r.status === 'skipped');
          const botProtected = results.filter(r => r.status === 'bot_protected');
          const fromFallback = results.filter(r => r.fromFallback);

          // Read auto-blacklisted count from storeHealth.json
          const HEALTH_FILE = 'data/storeHealth.json';
          const health = fs.existsSync(HEALTH_FILE) ? JSON.parse(fs.readFileSync(HEALTH_FILE, 'utf8')) : {};
          const autoBlacklisted = Object.entries(health).filter(([, h]) => h.autoBlacklisted);
          const newlyBlacklisted = skipped.filter(r =>
            (r.reason === 'cdn_blocked' || r.reason === 'navigation_error') &&
            health[r.storeAlias]?.autoBlacklisted
          );

          const tested = results.length - botProtected.length;
          let message = `🏬 VS Inpage Monitor — ${phase}\n\n`;
          message += `Stores checked: ${tested} (${botProtected.length} skipped — bot protection)\n`;
          message += `✅ ${passed.length} passed\n`;
          if (widgetMissing.length > 0) message += `⚠️ ${widgetMissing.length} widget missing\n`;
          if (failed.length > 0) message += `❌ ${failed.length} failed\n`;
          if (skipped.length > 0) message += `⏭ ${skipped.length} skipped (cdn/nav error)\n`;
          if (autoBlacklisted.length > 0) message += `🚫 ${autoBlacklisted.length} auto-blacklisted\n`;
          if (fromFallback.length > 0) message += `\n📦 ${fromFallback.length} used fallback URL\n`;

          const issues = [...widgetMissing, ...failed];
          if (issues.length > 0) {
            message += '\nIssues:\n';
            for (const r of issues) {
              const icon = r.status === 'widget_missing' ? '⚠️' : '❌';
              message += `${icon} ${r.storeAlias}`;
              if (r.error) message += ` — ${r.error.slice(0, 100)}`;
              message += '\n';
              if (r.url) message += `   🔗 ${r.url}\n`;
            }
          }

          if (newlyBlacklisted.length > 0) {
            message += '\nNewly auto-blacklisted (will be skipped next run):\n';
            for (const r of newlyBlacklisted) {
              const failures = health[r.storeAlias]?.consecutiveFailures ?? 0;
              message += `🚫 ${r.storeAlias} (${failures} consecutive ${r.reason} failures)\n`;
            }
          }

          if (autoBlacklisted.length > 0) {
            const names = autoBlacklisted.map(([alias]) => alias).join(', ');
            message += `\nAuto-blacklisted stores (skipped this run): ${names}\n`;
          }

          message += `\n🔗 ${runUrl}`;

          execSync(`curl -s -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            ${webhook}`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PHASE: ${{ github.event.inputs.phase }}
