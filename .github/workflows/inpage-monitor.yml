name: Inpage Monitor

on:
  schedule:
    - cron: '3 23 * * *'   # 8:03 AM JST (UTC+9) = 23:03 UTC previous day
  workflow_dispatch:
    inputs:
      phase:
        description: "Test phase (widget/api)"
        required: false
        default: "widget"
        type: string
      store_id:
        description: "Optional: single store ID to filter"
        required: false
        default: ""
        type: string
      product_type_id:
        description: "Optional: product type ID filter"
        required: false
        default: ""
        type: string
      gender:
        description: "Optional: gender filter"
        required: false
        default: ""
        type: string
      browser:
        description: "Browser to use (chrome/chromium/firefox/webkit)"
        required: false
        default: "chrome"
        type: string

jobs:
  # ── Job 1: Resolve URLs + split into chunks ───────────────────────────────
  prepare:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Resolve store URLs
        run: |
          node --input-type=module <<'SCRIPT'
          import { MONITOR_STORES } from './config/monitorStores.js';
          import { fetchRandomProduct } from './utils/fetchRandomProduct.js';
          import { readFileSync, writeFileSync, existsSync, mkdirSync } from 'fs';

          const storeIdFilter = process.env.STORE_ID ? Number(process.env.STORE_ID) : null;
          const productTypeId = process.env.PRODUCT_TYPE_ID ? Number(process.env.PRODUCT_TYPE_ID) : undefined;
          const gender = process.env.GENDER || undefined;

          const FALLBACK_FILE = 'data/fallbackProducts.json';
          const fallbacks = existsSync(FALLBACK_FILE)
            ? JSON.parse(readFileSync(FALLBACK_FILE, 'utf8'))
            : {};
          const getFallback = (alias) => fallbacks[alias] ?? null;

          const HEALTH_FILE = 'data/storeHealth.json';
          const health = existsSync(HEALTH_FILE)
            ? JSON.parse(readFileSync(HEALTH_FILE, 'utf8'))
            : {};

          const storeEntries = Object.entries(MONITOR_STORES)
            .filter(([alias, storeId]) => {
              if (storeIdFilter && storeId !== storeIdFilter) return false;
              if (health[alias]?.autoBlacklisted) {
                console.log(`[${alias}] Auto-blacklisted (${health[alias].consecutiveFailures} consecutive failures) — skipping`);
                return false;
              }
              return true;
            });

          console.log(`Resolving URLs for ${storeEntries.length} stores...`);

          const results = await Promise.all(
            storeEntries.map(async ([alias, storeId]) => {
              const fallback = getFallback(alias);
              if (fallback) {
                console.log(`[${alias}] Using fallback URL`);
                return { storeAlias: alias, storeId, url: fallback, fromFallback: true };
              }
              try {
                console.log(`[${alias}] No fallback — calling Random Product API`);
                const url = await fetchRandomProduct({
                  store_id: storeId,
                  product_type_id: productTypeId,
                  gender,
                });
                return { storeAlias: alias, storeId, url };
              } catch (err) {
                console.log(`[${alias}] No URL: ${err.message}`);
                return { storeAlias: alias, storeId, url: null };
              }
            })
          );

          const resolved = results.filter(r => r.url).length;
          console.log(`Resolved ${resolved}/${results.length} store URLs`);

          if (resolved === 0) {
            console.error('ERROR: No store URLs resolved — aborting');
            process.exit(1);
          }

          mkdirSync('data', { recursive: true });
          writeFileSync('data/monitor-urls.json', JSON.stringify(results, null, 2));
          console.log(`Wrote ${results.length} entries to data/monitor-urls.json`);
          SCRIPT
        env:
          STORE_ID: ${{ github.event.inputs.store_id }}
          PRODUCT_TYPE_ID: ${{ github.event.inputs.product_type_id }}
          GENDER: ${{ github.event.inputs.gender }}
          RANDOM_PRODUCT_API_URL: ${{ secrets.RANDOM_PRODUCT_API_URL }}

      - name: Split stores into chunks
        run: node scripts/split-monitor-chunks.js

      - name: Upload monitor chunks
        uses: actions/upload-artifact@v4
        with:
          name: monitor-chunks
          path: data/monitor-chunks.json
          retention-days: 1

      - name: Notify Slack - monitor starting
        run: |
          curl -s -X POST \
            -H "Content-type: application/json" \
            --data "{\"text\":\"🏬 VS Monitor starting (phase: ${{ github.event.inputs.phase }})...\"}" \
            "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ── Job 2: Matrix monitor — 5 parallel runners ───────────────────────────
  monitor:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        chunk: [0, 1, 2, 3, 4]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps chrome webkit

      - name: Download monitor chunks
        uses: actions/download-artifact@v4
        with:
          name: monitor-chunks
          path: data/

      - name: Run monitor tests (chunk ${{ matrix.chunk }})
        run: |
          BROWSER="${{ github.event.inputs.browser }}"
          if [ -n "$BROWSER" ]; then
            npx playwright test tests/monitor.spec.js --project="$BROWSER" --workers=4 --retries=0 | tee monitor-output-${{ matrix.chunk }}.log
          else
            npx playwright test tests/monitor.spec.js --project=chrome --project=webkit --workers=4 --retries=0 | tee monitor-output-${{ matrix.chunk }}.log
          fi
        env:
          TEST_PHASE: ${{ github.event.inputs.phase }}
          CHUNK_INDEX: ${{ matrix.chunk }}

      - name: Upload monitor output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output-${{ matrix.chunk }}
          path: monitor-output-${{ matrix.chunk }}.log
          retention-days: 1

  # ── Job 3: Summarize — update health + send Slack ─────────────────────────
  summarize:
    needs: monitor
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - name: Download all monitor outputs
        uses: actions/download-artifact@v4
        with:
          pattern: monitor-output-*
          merge-multiple: true
          path: logs/

      - name: Combine logs
        run: cat logs/monitor-output-*.log > monitor-output.log 2>/dev/null || echo "No logs found" > monitor-output.log

      - name: Write monitor report
        if: always()
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';

          if (!fs.existsSync('monitor-output.log')) process.exit(0);

          const fullLog = fs.readFileSync('monitor-output.log', 'utf8');
          const lines = fullLog.split('\n').filter(l => l.includes('MONITOR_RESULT:'));
          if (lines.length === 0) process.exit(0);

          // Merge multi-browser results: worst status wins, collect all browsers
          const STATUS_RANK = { failed: 3, widget_missing: 2, passed: 1, skipped: 0, bot_protected: 0, cdn_blocked: 0, navigation_error: 0 };
          const byStore = {};
          for (const line of lines) {
            try {
              const json = JSON.parse(line.replace(/^.*MONITOR_RESULT:\s*/, ''));
              if (!byStore[json.storeAlias]) {
                byStore[json.storeAlias] = { ...json, browsers: [json.browser].filter(Boolean) };
              } else {
                const cur = byStore[json.storeAlias];
                if (json.browser && !cur.browsers.includes(json.browser)) cur.browsers.push(json.browser);
                if ((STATUS_RANK[json.status] || 0) > (STATUS_RANK[cur.status] || 0)) {
                  cur.status = json.status;
                  cur.error = json.error;
                }
              }
            } catch {}
          }

          const results = Object.values(byStore);
          const HEALTH_FILE = 'data/storeHealth.json';
          const health = fs.existsSync(HEALTH_FILE) ? JSON.parse(fs.readFileSync(HEALTH_FILE, 'utf8')) : {};

          const summary = {
            total: results.length,
            passed: results.filter(r => r.status === 'passed').length,
            widgetMissing: results.filter(r => r.status === 'widget_missing').length,
            skipped: results.filter(r => r.status === 'skipped' || r.status === 'bot_protected').length,
            failed: results.filter(r => r.status === 'failed').length,
            fallbackUsed: results.filter(r => r.fromFallback).length,
          };

          const ongoingMissing = Object.entries(health)
            .filter(([, v]) => v.consecutiveWidgetMissing > 0)
            .map(([store, v]) => ({ store, consecutiveRuns: v.consecutiveWidgetMissing }))
            .sort((a, b) => b.consecutiveRuns - a.consecutiveRuns);

          const report = {
            timestamp: new Date().toISOString(),
            githubRunUrl: process.env.GITHUB_RUN_URL,
            summary,
            newIssues: results.filter(r => r.status === 'failed').map(r => ({ store: r.storeAlias, url: r.url, browsers: r.browsers, error: r.error || r.reason })),
            widgetMissingStores: results.filter(r => r.status === 'widget_missing').map(r => ({ store: r.storeAlias, url: r.url, browsers: r.browsers })),
            ongoingMissing,
            botProtected: results.filter(r => r.status === 'bot_protected').map(r => r.storeAlias),
            skippedStores: results.filter(r => r.status === 'skipped').map(r => ({ store: r.storeAlias, reason: r.reason })),
          };

          fs.mkdirSync('data', { recursive: true });
          fs.writeFileSync('data/monitor-report.json', JSON.stringify(report, null, 2));
          console.log('Monitor report written to data/monitor-report.json');
          EOF
        env:
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Send Slack notification
        if: always()
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';
          import { execSync } from 'child_process';

          const webhook = process.env.SLACK_WEBHOOK_URL;
          const dashboardUrl = process.env.DASHBOARD_URL || process.env.GITHUB_RUN_URL;
          const phase = process.env.PHASE;

          if (!fs.existsSync('data/monitor-report.json')) {
            execSync(`curl -s -X POST -H "Content-type: application/json" --data '{"text":"❌ VS Monitor failed — no report generated"}' "${webhook}"`);
            process.exit(0);
          }

          const { summary, newIssues, widgetMissingStores, ongoingMissing } = JSON.parse(fs.readFileSync('data/monitor-report.json', 'utf8'));
          const issues = summary.widgetMissing + summary.failed;
          const icon = issues > 0 ? '⚠️' : '✅';

          const parts = [
            `${summary.passed} passed`,
            summary.widgetMissing > 0 ? `${summary.widgetMissing} widget missing` : null,
            summary.failed > 0 ? `${summary.failed} failed` : null,
            summary.skipped > 0 ? `${summary.skipped} skipped` : null,
          ].filter(Boolean).join(' · ');

          const lines = [`${icon} VS Monitor (${phase}) — ${parts}`];

          if (widgetMissingStores?.length > 0) {
            const ongoingMap = Object.fromEntries((ongoingMissing || []).map(o => [o.store, o.consecutiveRuns]));
            const newMissing = widgetMissingStores.filter(s => !ongoingMap[s.store]).map(s => s.store);
            const recurring = widgetMissingStores.filter(s => ongoingMap[s.store]).map(s => `${s.store} ×${ongoingMap[s.store] + 1}`);

            if (newMissing.length > 0) lines.push(`*Widget missing (new):* ${newMissing.join(', ')}`);
            if (recurring.length > 0) lines.push(`*Widget missing (ongoing):* ${recurring.join(', ')}`);
          }
          if (newIssues?.length > 0) {
            const failedList = newIssues.map(i => `${i.store} (${i.error})`).join(', ');
            lines.push(`*Failed:* ${failedList}`);
          }

          lines.push(`<${dashboardUrl}|View dashboard →>`);
          const message = lines.join('\n');

          execSync(`curl -s -X POST \
            -H "Content-type: application/json" \
            --data '${JSON.stringify({ text: message })}' \
            "${webhook}"`);
          EOF
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
          GITHUB_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PHASE: ${{ github.event.inputs.phase }}

      - name: Update store health
        if: always()
        run: |
          node --input-type=module <<'SCRIPT'
          import { readFileSync, writeFileSync, existsSync } from 'fs';

          const HEALTH_FILE = 'data/storeHealth.json';
          const health = existsSync(HEALTH_FILE)
            ? JSON.parse(readFileSync(HEALTH_FILE, 'utf8'))
            : {};

          if (!existsSync('monitor-output.log')) process.exit(0);

          const log = readFileSync('monitor-output.log', 'utf8');
          const lines = log.split('\n').filter(l => l.includes('MONITOR_RESULT:'));

          const STATUS_RANK = { failed: 3, widget_missing: 2, passed: 1, skipped: 0, bot_protected: 0, cdn_blocked: 0, navigation_error: 0 };
          const byStore = {};
          for (const line of lines) {
            try {
              const json = JSON.parse(line.replace(/^.*MONITOR_RESULT:\s*/, ''));
              if (!byStore[json.storeAlias]) {
                byStore[json.storeAlias] = { ...json };
              } else {
                const cur = byStore[json.storeAlias];
                if ((STATUS_RANK[json.status] || 0) > (STATUS_RANK[cur.status] || 0)) {
                  cur.status = json.status;
                  cur.error = json.error;
                }
              }
            } catch {}
          }

          const BLACKLIST_THRESHOLD = 3;
          const BOT_STATUSES = new Set(['cdn_blocked', 'navigation_error']);

          for (const [alias, result] of Object.entries(byStore)) {
            if (!health[alias]) health[alias] = { consecutiveFailures: 0, consecutiveWidgetMissing: 0 };

            if (BOT_STATUSES.has(result.status)) {
              health[alias].consecutiveFailures = (health[alias].consecutiveFailures || 0) + 1;
              health[alias].lastFailureReason = result.status;
              health[alias].consecutiveWidgetMissing = 0;
              if (health[alias].consecutiveFailures >= BLACKLIST_THRESHOLD && !health[alias].autoBlacklisted) {
                health[alias].autoBlacklisted = true;
                console.log(`🚫 [${alias}] Auto-blacklisted after ${health[alias].consecutiveFailures} consecutive ${result.status} failures`);
              }
            } else if (result.status === 'widget_missing') {
              health[alias].consecutiveWidgetMissing = (health[alias].consecutiveWidgetMissing || 0) + 1;
              health[alias].consecutiveFailures = 0;
            } else if (result.status === 'passed') {
              if (health[alias].autoBlacklisted) {
                console.log(`✅ [${alias}] Recovered — removing from auto-blacklist`);
              }
              health[alias].consecutiveFailures = 0;
              health[alias].consecutiveWidgetMissing = 0;
              health[alias].autoBlacklisted = false;
              delete health[alias].lastFailureReason;
            }
          }

          writeFileSync(HEALTH_FILE, JSON.stringify(health, null, 2));
          const blacklisted = Object.values(health).filter(h => h.autoBlacklisted).length;
          console.log(`Store health saved. Auto-blacklisted: ${blacklisted}`);
          SCRIPT

      - name: Build dashboard
        if: always()
        run: node scripts/build-dashboard.js
        env:
          PHASE: ${{ github.event.inputs.phase }}

      - name: Commit store health and monitor report
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/storeHealth.json data/monitor-report.json data/monitor-history.json docs/
          git diff --staged --quiet || git commit -m "chore: update store health [skip ci]"
          for i in 1 2 3; do
            git pull --rebase origin ${{ github.ref_name }} && git push origin HEAD:${{ github.ref_name }} && break
            echo "Push attempt $i failed, retrying..."
            sleep 5
          done
