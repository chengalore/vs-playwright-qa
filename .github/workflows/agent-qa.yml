name: Agent QA

on:
  workflow_dispatch:
    inputs:
      instruction:
        description: "Natural language test instruction"
        required: true
        type: string
      slack_response_url:
        description: "Slack response_url for posting the result back"
        required: false
        type: string

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - run: npm ci

      - run: npx playwright install --with-deps chrome

      - name: Run agent test
        run: |
          npx playwright test tests/agent-qa.spec.js --project=chrome --reporter=list 2>&1 | tee agent-output.log
        env:
          INSTRUCTION: ${{ github.event.inputs.instruction }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Post result to Slack
        if: always()
        run: |
          node --input-type=module <<'EOF'
          import fs from 'fs';

          const responseUrl = process.env.SLACK_RESPONSE_URL;
          if (!responseUrl) { console.log('No response_url — skipping Slack post'); process.exit(0); }

          const log = fs.existsSync('agent-output.log') ? fs.readFileSync('agent-output.log', 'utf8') : '';
          const resultLine = log.split('\n').reverse().find(l => l.includes('AGENT_RESULT:'));

          let message;
          if (resultLine) {
            const result = JSON.parse(resultLine.replace(/^.*AGENT_RESULT:\s*/, ''));
            const icon = result.status === 'passed' ? '✅' : result.status === 'failed' ? '❌' : '⚠️';
            message = `${icon} *${result.status.toUpperCase()}*\n*Instruction:* ${result.instruction}\n*Result:* ${result.summary}`;
            if (result.error) message += `\n*Error:* ${result.error}`;
            if (result.url) message += `\n<${result.url}|Product page>`;
          } else {
            message = `⚠️ Agent test finished but reported no result.\n*Instruction:* ${process.env.INSTRUCTION}`;
          }

          const res = await fetch(responseUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: message }),
          });
          console.log('Slack response:', res.status);
          EOF
        env:
          SLACK_RESPONSE_URL: ${{ github.event.inputs.slack_response_url }}
          INSTRUCTION: ${{ github.event.inputs.instruction }}
